<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Школа юного геолога</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🌍 Школа юного геолога</h1>
    <div class="stats">
        <span>⭐ Опыт: <span id="xp">0</span></span>
        <span>🏆 Уровень: <span id="level">1</span></span>
        <span>📈 До след. уровня: <span id="xpToNext">50</span> ⭐</span>
    </div>
</header>

<nav>
    <button id="nav-theory" onclick="showTheory()">📖 Теория</button>
    <button id="nav-quiz" onclick="startQuiz()">❓ Викторина</button>
    <button id="nav-error" onclick="startFindError()">🔍 Найди ошибку</button>
    <button id="nav-odd" onclick="startFindOdd()">🧩 Найди лишнее</button>
    <button id="nav-sort" onclick="startSort()">📊 Сортировка</button>
    <button id="nav-match" onclick="startMatch()">🔗 Соотнеси</button>
    <button id="nav-image" onclick="startImageQuiz()">🖼️ Определи по описанию</button>
    <button id="nav-hardness" onclick="startHardnessTest()">📏 Шкала твёрдости</button>
    <button id="nav-lab" onclick="startHardnessLab()">🔬 Лаборатория</button>
    <button id="nav-achievements" onclick="showAchievements()">🏅 Достижения</button>
</nav>

<main id="game">
    <div class="welcome">
        <h2>Добро пожаловать!</h2>
        <p>
            Исследуйте мир горных пород и минералов, проходите задания,<br>
            получайте опыт и открывайте достижения.
        </p>
        <p style="margin-top:10px;font-size:14px;color:#555;">
            💡 Начните с <b>Теории</b>, затем переходите к заданиям!
        </p>
    </div>
</main>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
